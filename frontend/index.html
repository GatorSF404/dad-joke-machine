<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Push the button. The machine groans. A dad joke is born." />
  <title>The Dad Joke Machine</title>
  <!-- API URL: update this after deploying the backend Web Service on Render -->
  <meta name="api-base" content="https://dad-joke-machine-api.onrender.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%98%82%3C/text%3E%3C/svg%3E">
</head>
<body>
  <main class="stage">
    <h1 class="title">
      <span class="title-the">The</span>
      <span class="title-dad">Dad&nbsp;Joke</span>
      <span class="title-machine">Machine</span>
    </h1>

    <!-- THE MACHINE -->
    <div class="machine" id="machine" aria-hidden="true">
      <svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fef3c7"/>
            <stop offset="100%" stop-color="#fde68a"/>
          </linearGradient>
          <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d97706"/>
            <stop offset="50%" stop-color="#b45309"/>
            <stop offset="100%" stop-color="#7c2d12"/>
          </linearGradient>
          <linearGradient id="innerGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#451a03"/>
            <stop offset="100%" stop-color="#1c0701"/>
          </linearGradient>
          <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#cbd5e1"/>
            <stop offset="50%" stop-color="#94a3b8"/>
            <stop offset="100%" stop-color="#475569"/>
          </linearGradient>
          <linearGradient id="cylinderGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#334155"/>
            <stop offset="40%" stop-color="#94a3b8"/>
            <stop offset="60%" stop-color="#cbd5e1"/>
            <stop offset="100%" stop-color="#334155"/>
          </linearGradient>
          <radialGradient id="ledGreen">
            <stop offset="0%" stop-color="#bbf7d0"/>
            <stop offset="60%" stop-color="#22c55e"/>
            <stop offset="100%" stop-color="#14532d"/>
          </radialGradient>
          <radialGradient id="ledYellow">
            <stop offset="0%" stop-color="#fef08a"/>
            <stop offset="60%" stop-color="#eab308"/>
            <stop offset="100%" stop-color="#713f12"/>
          </radialGradient>
          <radialGradient id="ledRed">
            <stop offset="0%" stop-color="#fecaca"/>
            <stop offset="60%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#7f1d1d"/>
          </radialGradient>
        </defs>

        <!-- Workshop wall -->
        <rect width="800" height="420" fill="url(#bgGrad)"/>
        <!-- Floor shadow under the machine -->
        <ellipse cx="400" cy="400" rx="340" ry="12" fill="rgba(0,0,0,0.18)"/>

        <!-- ====== SMOKESTACK (sticking out the top) ====== -->
        <g class="stack">
          <rect x="98" y="22" width="36" height="62" fill="url(#metalGrad)" stroke="#1f2937" stroke-width="2"/>
          <rect x="115" y="22" width="3" height="62" fill="rgba(0,0,0,0.3)"/>
          <rect x="92" y="14" width="48" height="12" fill="#1f2937" rx="2"/>
          <rect x="100" y="26" width="32" height="3" fill="#374151"/>
        </g>
        <!-- Smoke puffs above stack -->
        <g class="smoke">
          <circle class="smoke-puff smoke-1" cx="116" cy="10"  r="10" fill="#e2e8f0" opacity="0"/>
          <circle class="smoke-puff smoke-2" cx="128" cy="-2"  r="14" fill="#e2e8f0" opacity="0"/>
          <circle class="smoke-puff smoke-3" cx="106" cy="-14" r="9"  fill="#e2e8f0" opacity="0"/>
        </g>

        <!-- ====== MACHINE BODY ====== -->
        <rect x="40" y="80" width="720" height="290" rx="16" fill="url(#bodyGrad)" stroke="#451a03" stroke-width="4"/>
        <!-- Top edge highlight -->
        <rect x="44" y="84" width="712" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
        <!-- Inner recessed panel -->
        <rect x="64" y="106" width="672" height="208" rx="10" fill="url(#innerGrad)" stroke="#1c0701" stroke-width="2"/>
        <!-- Panel inner shadow -->
        <rect x="64" y="106" width="672" height="6" fill="rgba(0,0,0,0.4)"/>

        <!-- Rivets -->
        <g fill="#1f2937">
          <circle cx="58" cy="98"  r="4"/><circle cx="58" cy="354" r="4"/>
          <circle cx="742" cy="98" r="4"/><circle cx="742" cy="354" r="4"/>
          <circle cx="170" cy="94" r="3"/><circle cx="285" cy="94" r="3"/>
          <circle cx="400" cy="94" r="3"/><circle cx="515" cy="94" r="3"/>
          <circle cx="630" cy="94" r="3"/>
          <circle cx="170" cy="358" r="3"/><circle cx="285" cy="358" r="3"/>
          <circle cx="400" cy="358" r="3"/><circle cx="515" cy="358" r="3"/>
          <circle cx="630" cy="358" r="3"/>
        </g>
        <!-- Rivet highlights -->
        <g fill="#94a3b8" opacity="0.55">
          <circle cx="57" cy="97" r="1.2"/><circle cx="741" cy="97" r="1.2"/>
          <circle cx="57" cy="353" r="1.2"/><circle cx="741" cy="353" r="1.2"/>
        </g>

        <!-- Brand plate -->
        <g transform="translate(400,100)">
          <rect x="-90" y="-12" width="180" height="22" rx="3" fill="#1f2937"/>
          <text x="0" y="3" text-anchor="middle" font-family="Bungee, sans-serif" font-size="11" fill="#fde047" letter-spacing="2">MODEL DJ-744</text>
        </g>

        <!-- ====== GEAR TRAIN ====== -->
        <!-- Gear 1: large CW, axle at (165,200) -->
        <g class="gear" transform="translate(165,200)">
          <circle r="8" fill="#1f2937"/>
          <g class="spin spin-cw spin-medium">
            <circle r="48" fill="#475569"/>
            <g fill="#475569">
              <rect x="-7" y="-60" width="14" height="14" rx="2"/>
              <rect x="-7" y="46"  width="14" height="14" rx="2"/>
              <rect x="-60" y="-7" width="14" height="14" rx="2"/>
              <rect x="46"  y="-7" width="14" height="14" rx="2"/>
              <g transform="rotate(45)">
                <rect x="-7" y="-60" width="14" height="14" rx="2"/>
                <rect x="-7" y="46"  width="14" height="14" rx="2"/>
                <rect x="-60" y="-7" width="14" height="14" rx="2"/>
                <rect x="46"  y="-7" width="14" height="14" rx="2"/>
              </g>
            </g>
            <circle r="38" fill="#64748b"/>
            <g fill="#334155">
              <circle cx="0"   cy="-26" r="5"/>
              <circle cx="0"   cy="26"  r="5"/>
              <circle cx="-26" cy="0"   r="5"/>
              <circle cx="26"  cy="0"   r="5"/>
            </g>
            <circle r="10" fill="#1e293b"/>
            <rect x="-2" y="-9" width="4" height="18" fill="#94a3b8"/>
          </g>
        </g>

        <!-- Gear 2: small CCW, axle at (256,168) -->
        <g class="gear" transform="translate(256,168)">
          <circle r="5" fill="#1f2937"/>
          <g class="spin spin-ccw spin-fast">
            <circle r="28" fill="#475569"/>
            <g fill="#475569">
              <rect x="-5" y="-36" width="10" height="10" rx="2"/>
              <rect x="-5" y="26"  width="10" height="10" rx="2"/>
              <rect x="-36" y="-5" width="10" height="10" rx="2"/>
              <rect x="26"  y="-5" width="10" height="10" rx="2"/>
              <g transform="rotate(45)">
                <rect x="-5" y="-36" width="10" height="10" rx="2"/>
                <rect x="-5" y="26"  width="10" height="10" rx="2"/>
                <rect x="-36" y="-5" width="10" height="10" rx="2"/>
                <rect x="26"  y="-5" width="10" height="10" rx="2"/>
              </g>
            </g>
            <circle r="20" fill="#64748b"/>
            <circle r="6" fill="#1e293b"/>
          </g>
        </g>

        <!-- Gear 3: medium CW, axle at (335,222) -->
        <g class="gear" transform="translate(335,222)">
          <circle r="6" fill="#1f2937"/>
          <g class="spin spin-cw spin-slow">
            <circle r="38" fill="#475569"/>
            <g fill="#475569">
              <rect x="-6" y="-48" width="12" height="12" rx="2"/>
              <rect x="-6" y="36"  width="12" height="12" rx="2"/>
              <rect x="-48" y="-6" width="12" height="12" rx="2"/>
              <rect x="36"  y="-6" width="12" height="12" rx="2"/>
              <g transform="rotate(45)">
                <rect x="-6" y="-48" width="12" height="12" rx="2"/>
                <rect x="-6" y="36"  width="12" height="12" rx="2"/>
                <rect x="-48" y="-6" width="12" height="12" rx="2"/>
                <rect x="36"  y="-6" width="12" height="12" rx="2"/>
              </g>
            </g>
            <circle r="29" fill="#64748b"/>
            <g fill="#334155">
              <circle cx="0"   cy="-18" r="4"/>
              <circle cx="0"   cy="18"  r="4"/>
              <circle cx="-18" cy="0"   r="4"/>
              <circle cx="18"  cy="0"   r="4"/>
            </g>
            <circle r="8" fill="#1e293b"/>
          </g>
        </g>

        <!-- Gear 4: tiny CCW, axle at (400,180) -->
        <g class="gear" transform="translate(400,180)">
          <circle r="4" fill="#1f2937"/>
          <g class="spin spin-ccw spin-veryfast">
            <circle r="18" fill="#475569"/>
            <g fill="#475569">
              <rect x="-4" y="-24" width="8" height="8" rx="2"/>
              <rect x="-4" y="16"  width="8" height="8" rx="2"/>
              <rect x="-24" y="-4" width="8" height="8" rx="2"/>
              <rect x="16"  y="-4" width="8" height="8" rx="2"/>
              <g transform="rotate(45)">
                <rect x="-4" y="-24" width="8" height="8" rx="2"/>
                <rect x="-4" y="16"  width="8" height="8" rx="2"/>
                <rect x="-24" y="-4" width="8" height="8" rx="2"/>
                <rect x="16"  y="-4" width="8" height="8" rx="2"/>
              </g>
            </g>
            <circle r="11" fill="#64748b"/>
            <circle r="3" fill="#1e293b"/>
          </g>
        </g>

        <!-- Drive belt loop linking gear 1 and gear 3 -->
        <ellipse cx="250" cy="211" rx="98" ry="32" fill="none" stroke="#1e293b" stroke-width="3" opacity="0.65" transform="rotate(7 250 211)"/>

        <!-- ====== PIPE between gear assembly and piston ====== -->
        <g class="pipes">
          <rect x="440" y="195" width="20" height="14" fill="#475569" stroke="#1f2937" stroke-width="1.5"/>
          <rect x="455" y="190" width="10" height="24" fill="#475569" stroke="#1f2937" stroke-width="1.5"/>
        </g>

        <!-- ====== PISTON ASSEMBLY ====== -->
        <g class="piston-assembly" transform="translate(495,140)">
          <!-- Cylinder body -->
          <rect x="0" y="20" width="80" height="130" rx="6" fill="url(#cylinderGrad)" stroke="#1f2937" stroke-width="2"/>
          <!-- top cap -->
          <rect x="-6" y="14" width="92" height="14" rx="3" fill="#1f2937"/>
          <!-- bottom flange -->
          <rect x="-8" y="148" width="96" height="12" rx="2" fill="#1f2937"/>
          <!-- Mount feet -->
          <rect x="-4" y="158" width="14" height="14" fill="#374151"/>
          <rect x="74" y="158" width="14" height="14" fill="#374151"/>
          <!-- Side bolts -->
          <g fill="#1f2937">
            <circle cx="6" cy="32" r="2.5"/>
            <circle cx="74" cy="32" r="2.5"/>
            <circle cx="6" cy="140" r="2.5"/>
            <circle cx="74" cy="140" r="2.5"/>
          </g>

          <!-- Piston head + rod (animated) -->
          <g class="piston">
            <!-- rod -->
            <rect x="34" y="-10" width="12" height="60" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
            <!-- knob -->
            <circle cx="40" cy="-12" r="9" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
            <circle cx="37" cy="-15" r="2.5" fill="#fecaca"/>
            <!-- head -->
            <rect x="6" y="48" width="68" height="22" rx="3" fill="#94a3b8" stroke="#1f2937" stroke-width="2"/>
            <rect x="10" y="52" width="60" height="4" rx="1" fill="#475569"/>
          </g>
        </g>

        <!-- Vent valve on cylinder side w/ steam puffs -->
        <g class="vent" transform="translate(488,180)">
          <rect x="-12" y="0" width="14" height="10" fill="#475569" stroke="#1f2937" stroke-width="1"/>
          <rect x="-14" y="-4" width="6" height="6" fill="#1f2937"/>
        </g>
        <g class="vent-puffs">
          <circle class="vent-puff vent-1" cx="468" cy="178" r="6" fill="#e2e8f0" opacity="0"/>
          <circle class="vent-puff vent-2" cx="458" cy="170" r="9" fill="#e2e8f0" opacity="0"/>
          <circle class="vent-puff vent-3" cx="464" cy="158" r="5" fill="#e2e8f0" opacity="0"/>
        </g>

        <!-- ====== PRESSURE GAUGE ====== -->
        <g class="gauge" transform="translate(660,200)">
          <!-- bezel -->
          <circle r="58" fill="#1f2937"/>
          <circle r="54" fill="#451a03"/>
          <circle r="50" fill="#fef3c7"/>
          <!-- danger arc (top right) -->
          <path d="M 0 -50 A 50 50 0 0 1 50 0" stroke="#dc2626" stroke-width="6" fill="none"/>
          <!-- tick marks -->
          <g stroke="#1f2937" stroke-width="2">
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-120)"/>
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-90)"/>
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-60)"/>
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(-30)"/>
            <line x1="0" y1="-46" x2="0" y2="-40"/>
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(30)"/>
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(60)"/>
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(90)"/>
            <line x1="0" y1="-46" x2="0" y2="-40" transform="rotate(120)"/>
          </g>
          <!-- numbers -->
          <g font-family="Bungee, monospace" font-size="8" fill="#1f2937" text-anchor="middle">
            <text x="-32" y="-22">0</text>
            <text x="0"   y="-32">50</text>
            <text x="32"  y="-22">100</text>
          </g>
          <!-- needle -->
          <g class="gauge-needle">
            <polygon points="0,4 -3,4 -1,-42 1,-42 3,4" fill="#dc2626"/>
            <circle r="5" fill="#1f2937"/>
            <circle r="2" fill="#fef3c7"/>
          </g>
          <text y="28" text-anchor="middle" font-family="Bungee, sans-serif" font-size="9" fill="#1f2937">PSI</text>
        </g>

        <!-- ====== STATUS LCD (left side) ====== -->
        <g transform="translate(70,318)">
          <rect x="0" y="0" width="140" height="32" rx="4" fill="#0f172a" stroke="#1f2937" stroke-width="2"/>
          <rect x="3" y="3" width="134" height="26" rx="3" fill="#022c22"/>
          <text id="statusText" x="70" y="22" text-anchor="middle" font-family="Bungee, monospace" font-size="14" fill="#86efac" letter-spacing="3">READY</text>
        </g>

        <!-- ====== INDICATOR LEDS (right side) ====== -->
        <g transform="translate(595,332)">
          <rect x="0" y="-10" width="105" height="20" rx="3" fill="#1f2937" stroke="#0f172a" stroke-width="1"/>
          <circle class="led led-1" cx="15"  cy="0" r="5" fill="url(#ledGreen)"/>
          <circle class="led led-2" cx="38"  cy="0" r="5" fill="url(#ledYellow)"/>
          <circle class="led led-3" cx="61"  cy="0" r="5" fill="url(#ledYellow)"/>
          <circle class="led led-4" cx="84"  cy="0" r="5" fill="url(#ledRed)"/>
          <g fill="none" stroke="#0f172a" stroke-width="1.2">
            <circle cx="15"  cy="0" r="5.5"/>
            <circle cx="38"  cy="0" r="5.5"/>
            <circle cx="61"  cy="0" r="5.5"/>
            <circle cx="84"  cy="0" r="5.5"/>
          </g>
        </g>

        <!-- ====== WARNING LAMP (far right) ====== -->
        <g class="warning-lamp" transform="translate(725,322)">
          <rect x="-3" y="8" width="6" height="14" fill="#475569"/>
          <ellipse cx="0" cy="24" rx="9" ry="3" fill="#1f2937"/>
          <circle class="warning-bulb" cx="0" cy="0" r="10" fill="#fde047" stroke="#a16207" stroke-width="2"/>
          <ellipse cx="-2" cy="-3" rx="3" ry="2" fill="rgba(255,255,255,0.6)"/>
        </g>

        <!-- ====== OUTPUT SLOT (wide, centered, the paper feed) ====== -->
        <g transform="translate(400,326)">
          <!-- Backing chassis -->
          <rect x="-160" y="-4" width="320" height="36" rx="4" fill="#1f2937"/>
          <!-- The dark mouth -->
          <rect x="-152" y="2" width="304" height="22" rx="2" fill="#0f172a"/>
          <!-- Inner shadow -->
          <rect x="-152" y="2" width="304" height="5" fill="rgba(0,0,0,0.55)"/>
          <!-- Side ridges -->
          <rect x="-158" y="-2" width="6" height="32" fill="#374151"/>
          <rect x="152"  y="-2" width="6" height="32" fill="#374151"/>
          <!-- Roller marks (suggest paper feed mechanism) -->
          <g fill="#475569">
            <circle cx="-140" cy="13" r="2"/>
            <circle cx="-120" cy="13" r="2"/>
            <circle cx="120"  cy="13" r="2"/>
            <circle cx="140"  cy="13" r="2"/>
          </g>
          <!-- Always-visible paper edge: a thin sliver of paper peeking out below the mouth -->
          <g class="paper-peek">
            <rect x="-148" y="24" width="296" height="14" fill="#fafaf9" stroke="#78716c" stroke-width="0.5"/>
            <!-- Perforation holes along the bottom edge of the peek (the tear-off strip) -->
            <g fill="#78716c">
              <circle cx="-138" cy="35" r="1.4"/><circle cx="-118" cy="35" r="1.4"/>
              <circle cx="-98"  cy="35" r="1.4"/><circle cx="-78"  cy="35" r="1.4"/>
              <circle cx="-58"  cy="35" r="1.4"/><circle cx="-38"  cy="35" r="1.4"/>
              <circle cx="-18"  cy="35" r="1.4"/><circle cx="2"    cy="35" r="1.4"/>
              <circle cx="22"   cy="35" r="1.4"/><circle cx="42"   cy="35" r="1.4"/>
              <circle cx="62"   cy="35" r="1.4"/><circle cx="82"   cy="35" r="1.4"/>
              <circle cx="102"  cy="35" r="1.4"/><circle cx="122"  cy="35" r="1.4"/>
              <circle cx="138"  cy="35" r="1.4"/>
            </g>
          </g>
          <!-- "JOKE OUTPUT" label above the slot -->
          <text x="0" y="-10" text-anchor="middle" font-family="Bungee, sans-serif" font-size="10" fill="#fef3c7" letter-spacing="3">★ JOKE OUTPUT ★</text>
        </g>
      </svg>
    </div>

    <!-- JOKE READOUT (the printed paper feeding from the machine's slot) -->
    <div class="readout" id="readout">
      <div class="readout-paper" id="readoutPaper">
        <div class="readout-perf" aria-hidden="true"></div>
        <p class="readout-text" id="jokeText">Press the button. Receive wisdom.</p>
        <div class="readout-tear" aria-hidden="true"></div>
      </div>
    </div>

    <!-- THE BIG BUTTON -->
    <div class="button-wrap">
      <button class="big-button" id="bigButton" type="button" aria-label="Generate a dad joke">
        <span class="big-button-top">
          <span class="big-button-label">PUSH&nbsp;ME</span>
        </span>
        <span class="big-button-base"></span>
      </button>
      <p class="hint" id="hint">↑ go on, you know you want to</p>
    </div>

    <footer class="footer">
      <span>Crank-tested. Joke-approved. ·</span>
      <a href="#" id="aboutLink">about</a>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
